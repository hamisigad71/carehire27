<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Create Booking</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark max-w-md mx-auto shadow-xl overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-10 flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Create Booking</h2>
</div>
<div class="flex flex-col gap-6 p-4 pb-32">
<!-- Customer Section -->
<section class="flex flex-col gap-3">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1.5 ml-1">Select Customer</p>
<div class="relative group">
<select class="appearance-none form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-4 pr-12 text-base font-normal leading-normal transition-all">
<option value="">Search or select customer</option>
<option value="1">John Doe</option>
<option value="2">Jane Smith</option>
<option value="3">Robert Wilson</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
</section>
<!-- Vehicle Section -->
<section class="flex flex-col gap-3">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1.5 ml-1">Select Vehicle</p>
<div class="relative group">
<select class="appearance-none form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-4 pr-12 text-base font-normal leading-normal transition-all">
<option value="">Search or select vehicle</option>
<option value="v1">Tesla Model 3 - Black</option>
<option value="v2">Toyota Camry - Silver</option>
<option value="v3">Ford Explorer - White</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
</section>
<!-- Pickup Schedule -->
<section class="flex flex-col gap-3">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider ml-1">Pickup Schedule</h3>
<div class="grid grid-cols-2 gap-3">
<label class="flex flex-col flex-1">
<p class="text-slate-600 dark:text-slate-400 text-xs font-medium pb-1.5 ml-1">Pickup Date</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 px-4 text-sm font-normal transition-all" type="date"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-600 dark:text-slate-400 text-xs font-medium pb-1.5 ml-1">Pickup Time</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 px-4 text-sm font-normal transition-all" type="time"/>
</div>
</label>
</div>
</section>
<!-- Return Schedule -->
<section class="flex flex-col gap-3">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider ml-1">Return Schedule</h3>
<div class="grid grid-cols-2 gap-3">
<label class="flex flex-col flex-1">
<p class="text-slate-600 dark:text-slate-400 text-xs font-medium pb-1.5 ml-1">Return Date</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 px-4 text-sm font-normal transition-all" type="date"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-600 dark:text-slate-400 text-xs font-medium pb-1.5 ml-1">Return Time</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 px-4 text-sm font-normal transition-all" type="time"/>
</div>
</label>
</div>
</section>
<!-- Driver Option -->
<section class="flex flex-col gap-3">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1 ml-1">Driver Option</p>
<div class="flex gap-2">
<label class="flex-1">
<input checked="" class="peer hidden" name="driver" type="radio"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 peer-checked:border-primary peer-checked:bg-primary/5 cursor-pointer transition-all">
<span class="material-symbols-outlined mb-1 text-slate-400 peer-checked:text-primary">person</span>
<span class="text-xs font-medium">Self Drive</span>
</div>
</label>
<label class="flex-1">
<input class="peer hidden" name="driver" type="radio"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 peer-checked:border-primary peer-checked:bg-primary/5 cursor-pointer transition-all">
<span class="material-symbols-outlined mb-1 text-slate-400 peer-checked:text-primary">hail</span>
<span class="text-xs font-medium">With Driver</span>
</div>
</label>
</div>
</section>
<!-- Payment Method -->
<section class="flex flex-col gap-3">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1 ml-1">Payment Method</p>
<div class="flex flex-col gap-2">
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<input checked="" class="w-5 h-5 text-primary border-slate-300 focus:ring-primary" name="payment" type="radio"/>
<span class="material-symbols-outlined text-slate-500">payments</span>
<span class="text-sm font-medium">Cash</span>
</label>
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<input class="w-5 h-5 text-primary border-slate-300 focus:ring-primary" name="payment" type="radio"/>
<span class="material-symbols-outlined text-slate-500">credit_card</span>
<span class="text-sm font-medium">Credit/Debit Card</span>
</label>
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
<input class="w-5 h-5 text-primary border-slate-300 focus:ring-primary" name="payment" type="radio"/>
<span class="material-symbols-outlined text-slate-500">account_balance_wallet</span>
<span class="text-sm font-medium">Mobile Money</span>
</label>
</div>
</section>
</div>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/25 active:scale-[0.98] transition-all">
<span>Create Booking</span>
<span class="material-symbols-outlined text-lg">check_circle</span>
</button>
</div>
</div>
</body></html>
