<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">

<span class="material-symbols-outlined text-base fill-current">star</span>
<span class="text-sm font-bold">4.9</span>
</div>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400">ID: #DRV-9920 • 128 trips</p>
</div>
</div>
<div class="ml-4 size-6 flex items-center justify-center rounded-full bg-primary text-white">

</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h4 class="font-bold text-slate-900 dark:text-white">Sarah Jenkins</h4>

<span class="material-symbols-outlined text-base fill-current">star</span>
<span class="text-sm font-bold">4.8</span>

</div>
<p class="text-xs text-slate-500 dark:text-slate-400">ID: #DRV-8841 • 215 trips</p>

</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h4 class="font-bold text-slate-900 dark:text-white">David Chen</h4>
<div class="flex items-center gap-1 text-amber-500">
<span class="material-symbols-outlined text-base fill-current">star</span>
<span class="text-sm font-bold">4.9</span>
</div>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400">ID: #DRV-4412 • 94 trips</p>
</div>
</div>
<div class="ml-4 size-6 flex items-center justify-center rounded-full border border-slate-300 dark:border-slate-700"></div>

<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 active:scale-95 transition-transform flex items-center justify-center gap-2">
