<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Back card (gold) -->
  <rect x="20" y="60" width="140" height="100" rx="12" fill="rgba(251, 191, 36, 0.2)" stroke="rgba(251, 191, 36, 0.6)"/>
  <rect x="30" y="55" width="140" height="20" rx="4" fill="rgba(51, 65, 85, 0.3)"/>
  
  <!-- Front card (blue) -->
  <g transform="translate(10, 20)">
    <rect x="30" y="80" width="140" height="100" rx="12" fill="rgba(59, 130, 246, 0.15)" stroke="currentColor"/>
    
    <!-- Chip -->
    <rect x="50" y="100" width="24" height="24" rx="2" fill="rgba(251, 191, 36, 0.6)" stroke="rgba(251, 191, 36, 0.8)"/>
    <line x1="55" y1="105" x2="55" y2="119"/>
    <line x1="62" y1="105" x2="62" y2="119"/>
    <line x1="69" y1="105" x2="69" y2="119"/>
    
    <!-- Cardholder lines -->
    <line x1="50" y1="155" x2="80" y2="155"/>
    <line x1="50" y1="165" x2="100" y2="165"/>
    
    <!-- Card number dots -->
    <circle cx="120" cy="105" r="2" fill="currentColor"/>
    <circle cx="135" cy="105" r="2" fill="currentColor"/>
    <circle cx="120" cy="115" r="2" fill="currentColor"/>
    <circle cx="135" cy="115" r="2" fill="currentColor"/>
  </g>
</svg>